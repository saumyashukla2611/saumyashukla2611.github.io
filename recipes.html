<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes — Saumya Shukla</title>
  <meta name="description" content="A collection of recipes — search by keyword or filter by ingredient.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Saumya Shukla</a>
      <button class="nav__toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="recipes.html" class="active">Recipes</a></li>
        <li><a href="archive.html">Archive</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <header class="recipes-header container">
    <div class="section__label">Recipes</div>
    <h1 class="section__title">Kitchen Notes</h1>
    <p class="section__subtitle" style="margin: 0 auto;">
      Collected recipes — search by name or filter by ingredient.
    </p>
  </header>

  <!-- Search -->
  <div class="recipes-search">
    <div class="recipes-search__wrap">
      <svg class="recipes-search__icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input
        type="text"
        id="recipe-search"
        class="recipes-search__input"
        placeholder="Search recipes or ingredients..."
        autocomplete="off"
      />
    </div>
  </div>

  <!-- Ingredient chip filters -->
  <div class="chip-filters">
    <div class="chip-filters__label">Filter by Ingredient</div>
    <div class="chip-filters__list" id="ingredient-chips">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Results count -->
  <div class="recipes-count" id="recipes-count"></div>

  <!-- Recipe cards -->
  <section class="recipes-grid">
    <div class="recipes-grid__inner" id="recipes-grid">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__name">Saumya Shukla</div>
      <ul class="footer__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="archive.html">Archive</a></li>
      </ul>
      <div class="footer__copy">&copy; 2024 Saumya Shukla. All rights reserved.</div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="https://unpkg.com/@lyket/widget@latest/dist/lyket.js?apiKey=pt_6d7c4185902c012840bc9c1ef0afad"></script>
  <script>
    (function () {
      let allRecipes = [];
      let activeIngredients = new Set();
      let searchQuery = '';

      const grid = document.getElementById('recipes-grid');
      const chipsContainer = document.getElementById('ingredient-chips');
      const searchInput = document.getElementById('recipe-search');
      const countEl = document.getElementById('recipes-count');

      // Load recipes
      fetch('recipes/recipes.json')
        .then(r => r.json())
        .then(recipes => {
          allRecipes = recipes;
          buildIngredientChips();
          render();
        })
        .catch(() => {
          grid.innerHTML = '<div class="recipes-empty">No recipes yet. <a href="recipe-editor.html">Add your first recipe.</a></div>';
        });

      // Build unique ingredient chips
      function buildIngredientChips() {
        const all = new Set();
        allRecipes.forEach(r => r.ingredients.forEach(i => all.add(i.toLowerCase())));
        const sorted = [...all].sort();

        let html = sorted.map(ing =>
          `<button class="chip" data-ingredient="${escapeAttr(ing)}">${escapeHtml(ing)}<span class="chip__remove">&times;</span></button>`
        ).join('');

        html += `<button class="chip-filters__clear" id="clear-filters" style="display:none;">Clear all</button>`;
        chipsContainer.innerHTML = html;

        // Bind chip clicks
        chipsContainer.querySelectorAll('.chip').forEach(chip => {
          chip.addEventListener('click', () => {
            const ing = chip.dataset.ingredient;
            if (activeIngredients.has(ing)) {
              activeIngredients.delete(ing);
              chip.classList.remove('active');
            } else {
              activeIngredients.add(ing);
              chip.classList.add('active');
            }
            updateClearButton();
            render();
          });
        });

        document.getElementById('clear-filters').addEventListener('click', () => {
          activeIngredients.clear();
          chipsContainer.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          updateClearButton();
          render();
        });
      }

      function updateClearButton() {
        const btn = document.getElementById('clear-filters');
        if (btn) btn.style.display = activeIngredients.size > 0 ? '' : 'none';
      }

      // Search input
      searchInput.addEventListener('input', () => {
        searchQuery = searchInput.value.trim().toLowerCase();
        render();
      });

      // Filter and render
      function render() {
        let filtered = allRecipes;

        // Filter by active ingredient chips (AND logic: must contain ALL selected)
        if (activeIngredients.size > 0) {
          filtered = filtered.filter(r => {
            const rIngs = r.ingredients.map(i => i.toLowerCase());
            return [...activeIngredients].every(sel => rIngs.includes(sel));
          });
        }

        // Filter by search query (matches title, description, or ingredients)
        if (searchQuery) {
          filtered = filtered.filter(r => {
            const haystack = [
              r.title,
              r.description,
              ...r.ingredients
            ].join(' ').toLowerCase();
            return haystack.includes(searchQuery);
          });
        }

        // Update count
        countEl.textContent = filtered.length === allRecipes.length
          ? `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`
          : `${filtered.length} of ${allRecipes.length} recipe${allRecipes.length !== 1 ? 's' : ''}`;

        // Render cards
        if (filtered.length === 0) {
          grid.innerHTML = '<div class="recipes-empty">No recipes match your search. Try different keywords or clear the filters.</div>';
          return;
        }

        grid.innerHTML = filtered.map(r => `
          <a href="recipes/${r.file}" class="recipe-card">
            <div class="recipe-card__title">${escapeHtml(r.title)}</div>
            <div class="recipe-card__desc">${escapeHtml(r.description)}</div>
            <div class="recipe-card__chips">
              ${r.ingredients.map(i => `<span class="recipe-card__chip">${escapeHtml(i)}</span>`).join('')}
            </div>
          </a>
        `).join('');
      }

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }

      function escapeAttr(str) {
        return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
    })();
  </script>

</body>
</html>
