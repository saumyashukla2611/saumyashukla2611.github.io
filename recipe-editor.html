<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Recipe — Saumya Shukla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Saumya Shukla</a>
      <button class="nav__toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="archive.html">Archive</a></li>
        <li><a href="write.html">Write</a></li>
      </ul>
    </div>
  </nav>

  <!-- Recipe Editor -->
  <main class="recipe-editor-wrap">

    <input
      type="text"
      id="recipe-title"
      class="recipe-editor__title-input"
      placeholder="Recipe Title"
      autocomplete="off"
    />

    <div class="recipe-editor__field">
      <label class="recipe-editor__label" for="recipe-desc">Description</label>
      <input
        type="text"
        id="recipe-desc"
        class="recipe-editor__input"
        placeholder="A short description of the dish..."
        autocomplete="off"
      />
    </div>

    <!-- Ingredient input -->
    <div class="ingredient-input-wrap">
      <label class="recipe-editor__label">Ingredients</label>
      <div class="ingredient-input__row">
        <input
          type="text"
          id="ingredient-field"
          class="ingredient-input__field"
          placeholder="Type an ingredient and press Enter..."
          autocomplete="off"
        />
        <button id="add-ingredient" class="ingredient-input__add">+ Add</button>
      </div>
      <div class="ingredient-chips" id="ingredient-chips-editor">
        <!-- Chips rendered by JS -->
      </div>
    </div>

    <!-- Toolbar -->
    <div class="editor__toolbar">
      <button data-cmd="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
      <button data-cmd="italic" title="Italic (Ctrl+I)"><em>I</em></button>
      <div class="separator"></div>
      <button data-cmd="h2" title="Heading 2">H2</button>
      <button data-cmd="h3" title="Heading 3">H3</button>
      <button data-cmd="paragraph" title="Paragraph">P</button>
      <div class="separator"></div>
      <button data-cmd="insertUnorderedList" title="Bullet List">&bull; List</button>
      <button data-cmd="insertOrderedList" title="Numbered List">1. List</button>
      <div class="separator"></div>
      <button data-cmd="hr" title="Horizontal Rule">&mdash;</button>
    </div>

    <!-- Content area -->
    <div
      id="recipe-editor-content"
      class="editor__content"
      contenteditable="true"
      spellcheck="true"
      style="min-height: 40vh;"
    ></div>

    <!-- Actions -->
    <div class="editor__actions">
      <button id="save-recipe-draft" class="btn">Save Draft</button>
      <button id="preview-recipe" class="btn btn--outline">Preview</button>
      <button id="export-recipe" class="btn btn--accent">Export HTML</button>
      <button id="clear-recipe-editor" class="btn btn--outline" style="margin-left:auto;color:var(--muted);border-color:var(--muted);">Clear</button>
    </div>

    <!-- Saved Drafts -->
    <div class="drafts" style="display:none;">
      <h3 class="drafts__title">Your Recipe Drafts</h3>
      <ul class="drafts__list" id="recipe-drafts-list"></ul>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__name">Saumya Shukla</div>
      <ul class="footer__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="archive.html">Archive</a></li>
        <li><a href="write.html">Write</a></li>
      </ul>
      <div class="footer__copy">&copy; 2024 Saumya Shukla. All rights reserved.</div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/recipe-editor.js"></script>

</body>
</html>
