<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Saumya Shukla</title>
  <meta name="description" content="Complete archive of all blog posts.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Saumya Shukla</a>
      <button class="nav__toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="archive.html" class="active">Archive</a></li>
        <li><a href="write.html">Write</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <header class="archive-header container">
    <div class="section__label">Archive</div>
    <h1 class="section__title">All Posts</h1>
    <p class="section__subtitle" style="margin: 0 auto;">
      A chronological collection of everything published.
    </p>
  </header>

  <!-- Archive list -->
  <section class="archive-list container" id="archive-list">
    <!-- Populated by JS -->
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__name">Saumya Shukla</div>
      <ul class="footer__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="archive.html">Archive</a></li>
        <li><a href="write.html">Write</a></li>
      </ul>
      <div class="footer__copy">&copy; 2024 Saumya Shukla. All rights reserved.</div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    fetch('posts/posts.json')
      .then(r => r.json())
      .then(posts => {
        const container = document.getElementById('archive-list');
        if (!container) return;

        // Group by year, sorted descending
        const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
        const grouped = {};
        sorted.forEach(p => {
          const year = p.date.split('-')[0];
          if (!grouped[year]) grouped[year] = [];
          grouped[year].push(p);
        });

        let html = '';
        Object.keys(grouped).sort((a, b) => b - a).forEach(year => {
          html += `<h2 class="archive-year">${year}</h2>`;
          grouped[year].forEach(p => {
            const date = new Date(p.date + 'T00:00:00').toLocaleDateString('en-US', {
              month: 'short', day: 'numeric'
            });
            html += `
              <a href="posts/${p.file}" class="archive-entry">
                <span class="archive-entry__title">${p.title}</span>
                <span class="archive-entry__date">${date}</span>
              </a>
            `;
          });
        });

        container.innerHTML = html;
      })
      .catch(() => {
        document.getElementById('archive-list').innerHTML =
          '<p style="color:var(--muted);text-align:center;padding:4rem 0;">No posts in the archive yet.</p>';
      });
  </script>

</body>
</html>
