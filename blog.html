<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Saumya Shukla</title>
  <meta name="description" content="Thoughts on technology, strategy, and building things that matter.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Saumya Shukla</a>
      <button class="nav__toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul class="nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="archive.html">Archive</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <header class="blog-header container">
    <div class="section__label">Blog</div>
    <h1 class="section__title">Writing &amp; Ideas</h1>
    <p class="section__subtitle" style="margin: 0 auto;">
      Exploring technology, strategy, and the craft of building.
    </p>
  </header>

  <!-- Blog list -->
  <section class="blog-list container">
    <div class="blog-list__grid" id="blog-list">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__name">Saumya Shukla</div>
      <ul class="footer__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="archive.html">Archive</a></li>
      </ul>
      <div class="footer__copy">&copy; 2024 Saumya Shukla. All rights reserved.</div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    fetch('posts/posts.json')
      .then(r => r.json())
      .then(posts => {
        const grid = document.getElementById('blog-list');
        if (!grid) return;
        const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
        grid.innerHTML = sorted.map(p => {
          const date = new Date(p.date + 'T00:00:00').toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          return `
            <a href="posts/${p.file}" class="blog-list__item">
              <div class="blog-list__item-tag">${p.tags}</div>
              <div class="blog-list__item-title">${p.title}</div>
              <div class="blog-list__item-excerpt">${p.excerpt}</div>
              <div class="blog-list__item-date">${date}</div>
            </a>
          `;
        }).join('');
      })
      .catch(() => {
        document.getElementById('blog-list').innerHTML =
          '<p style="color:var(--muted);text-align:center;">No posts yet. <a href="editor.html">Write your first post.</a></p>';
      });
  </script>

</body>
</html>
